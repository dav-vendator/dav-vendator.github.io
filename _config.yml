# Site settings
title: "Davinder Singh"
subtitle: "PhD @ IIT Bombay | Quantum Information & QML"
name: "Davinder Singh"
description: "Personal academic website and portfolio of Davinder Singh, PhD Research Scholar at IIT Bombay."
url: "https://dav-vendator.github.io"
baseurl: ""

repository: "dav-vendator/dav-vendator.github.io"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "neon"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Author profile
author:
  name: "Davinder Singh"
  avatar: "/assets/images/profile.jpg"
  bio: "PhD Research Scholar at IIT Bombay working on Quantum Information, Quantum Machine Learning, and coherent temporal memory."
  location: "Mumbai, India"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dav-vendator"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://medium.com/@dvendator"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/dvendator"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      show_date: false
      read_time: false
      comments: false
      share: false
      related: false

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Markdown
markdown: kramdown
kramdown:
  input: GFM

# Feed
feed:
  path: feed.xml

# Search
search: true

# Include files/folders
include:
  - _pages

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .sass-cache
  - .jekyll-cache